name: CI

on:
  push:
    branches: [ main, wsl-test ]
  pull_request:
    branches: [ main ]
  workflow_call:

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6
        with:
          go-version-file: 'go.mod'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          version: latest

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'

      - name: Install prettier
        run: npm install --no-save prettier

      - name: Check markdown formatting
        run: |
          npx prettier --check "**/*.md" || (echo "Please run 'npx prettier --write \"**/*.md\"' to format your markdown files" && exit 1)

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6
        with:
          go-version-file: 'go.mod'

      - name: Download dependencies
        run: go mod download

      - name: Run fast tests
        run: go test -v -race ./internal/...

      - name: Set up Lima
        uses: lima-vm/lima-actions/setup@03b96d61959e83b2c737e44162c3088e81de0886 # v1.0.1
        id: lima-actions-setup

      - name: Cache ~/.cache/lima
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-actions-setup.outputs.version }}

      - name: Run e2e tests
        run: go test -v ./e2e/...
  wsl:
    name: WSL Test
    runs-on: windows-11-arm
    steps:
      - name: Log Windows OS and WSL status
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $os = Get-CimInstance -ClassName Win32_OperatingSystem
          Write-Host "OS: $($os.Caption) $($os.Version) build $($os.BuildNumber) arch $($os.OSArchitecture)"
          Write-Host "Kernel: $($os.Version)"
          Write-Host "Computer: $env:COMPUTERNAME"

          $wslFeature = $null
          $vmpFeature = $null
          try {
            $wslFeature = Get-WindowsOptionalFeature -Online -FeatureName Microsoft-Windows-Subsystem-Linux
            Write-Host "Feature Microsoft-Windows-Subsystem-Linux: $($wslFeature.State)"
          } catch {
            Write-Host "Feature query failed (WSL): $($_.Exception.Message)"
          }
          try {
            $vmpFeature = Get-WindowsOptionalFeature -Online -FeatureName VirtualMachinePlatform
            Write-Host "Feature VirtualMachinePlatform: $($vmpFeature.State)"
          } catch {
            Write-Host "Feature query failed (VirtualMachinePlatform): $($_.Exception.Message)"
          }

          $wslEnabled = $wslFeature -and $wslFeature.State -eq 'Enabled'
          $vmpEnabled = $vmpFeature -and $vmpFeature.State -eq 'Enabled'
          Write-Host "WSL enabled: $wslEnabled"
          Write-Host "Virtual Machine Platform enabled: $vmpEnabled"

          $cpu = Get-CimInstance -ClassName Win32_Processor | Select-Object -First 1
          $virtFirmware = $cpu.VirtualizationFirmwareEnabled
          $slat = $cpu.SecondLevelAddressTranslationExtensions
          $dep = $os.DataExecutionPrevention_Available
          $hypervisorPresent = (Get-CimInstance -ClassName Win32_ComputerSystem).HypervisorPresent
          Write-Host "Hyper-V requirements: VirtualizationFirmwareEnabled=$virtFirmware SLAT=$slat DEP=$dep HypervisorPresent=$hypervisorPresent"

          $buildOk = $false
          if ($os.BuildNumber -match '^\d+$') {
            $buildOk = [int]$os.BuildNumber -ge 19041
          }

          $requirementsKnown = ($virtFirmware -is [bool]) -and ($slat -is [bool]) -and ($dep -is [bool])
          if (-not $buildOk) {
            $wsl2SupportStatus = $false
          } elseif ($requirementsKnown) {
            $wsl2SupportStatus = [bool]($virtFirmware -and $slat -and $dep)
          } else {
            $wsl2SupportStatus = "Unknown"
          }
          Write-Host "WSL2 would be supported: $wsl2SupportStatus"

          if (Get-Command wsl.exe -ErrorAction SilentlyContinue) {
            try {
              Write-Host "wsl.exe --status:"
              wsl.exe --status
            } catch {
              Write-Host "wsl.exe --status failed: $($_.Exception.Message)"
            }
          } else {
            Write-Host "wsl.exe not found"
          }

      - name: Install WSL (Windows)
        if: runner.os == 'Windows' && runner.arch == 'X64'
        uses: Vampire/setup-wsl@v6
        with:
          distribution: Ubuntu-24.04
          additional-packages: |
            openssh-server
            docker.io
      
      - name: Setup SSH (Windows - WSL)
        if: runner.os == 'Windows' && runner.arch == 'X64'
        shell: wsl-bash {0}
        run: |
          useradd -G kvm,docker -m -s /bin/bash test
          passwd -d test

          cat > /etc/ssh/sshd_config.d/01-passwordless-authentication.conf << 'EOF'
          PasswordAuthentication yes
          PermitEmptyPasswords yes
          UsePAM no
          EOF
          
          systemctl daemon-reload
          systemctl restart ssh
