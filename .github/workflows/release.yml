name: Release

on:
  push:
    tags:
      - v[0-9].[0-9]+.[0-9]+
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag, for example v1.2.3 or v1.2.3-rc1
        required: true
        type: string

concurrency:
  group: release-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      checkout-ref: ${{ github.ref }}
    secrets: inherit

  release:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.version.outputs.release-version }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6
        with:
          go-version-file: 'go.mod'
      - name: Set release names
        id: version
        env:
          RELEASE_TAG: ${{ inputs['release-tag'] || github.ref_name }}
        run: |
          echo "release-version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Set git config
        if: ${{ inputs['release-tag'] != '' }}
        run: |
          git config --global user.email "remoteproc-runtime-release@users.noreply.github.com"
          git config --global user.name "remoteproc-runtime-release"
      - name: Create tag
        if: ${{ inputs['release-tag'] != '' }}
        env:
          RELEASE_TAG: ${{ inputs['release-tag'] }}
        run: |
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-artifactory:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token for publisher
        id: publisher-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.ML_REPO_ACCESS_APP_ID }}
          private-key: ${{ secrets.ML_REPO_ACCESS_PRIVATE_KEY }}
          owner: Arm-Debug
          repositories: remoteproc-runtime-publisher

      - name: Trigger Artifactory publisher
        env:
          GH_TOKEN: ${{ steps.publisher-token.outputs.token }}
        run: |
          run_url="$(gh workflow run upload-to-artifactory.yaml \
            --repo Arm-Debug/remoteproc-runtime-publisher \
            --ref main \
            --field release-version="${{ needs.release.outputs.release-version }}" \
            --field artifactory-uploadables="remoteproc-runtime_${{ needs.release.outputs.release-version }}_linux_arm64.tar.gz")"
          gh run watch "${run_url##*/}" \
            --repo Arm-Debug/remoteproc-runtime-publisher \
            --exit-status
