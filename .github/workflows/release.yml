name: Release

on:
  push:
    tags:
      - v[0-9].[0-9]+.[0-9]+
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag, for example v1.2.3 or v1.2.3-rc1
        required: true
        type: string
      pre-release:
        description: Pre-release
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      checkout-ref: ${{ inputs['release-tag'] || github.ref }}
    secrets: inherit

  release:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.version.outputs.release-version }}
      archive-artifact-name: ${{ steps.version.outputs.archive-artifact-name }}
      archive-uploadable: ${{ steps.version.outputs.archive-uploadable }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          ref: ${{ inputs['release-tag'] || github.ref }}
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6
        with:
          go-version-file: 'go.mod'
      - name: Set release names
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive_uploadable="remoteproc-runtime_${version}_linux_arm64"

          echo "release-version=${version}" >> "$GITHUB_OUTPUT"
          echo "archive-artifact-name=remoteproc-runtime-${version}-linux" >> "$GITHUB_OUTPUT"
          echo "archive-uploadable=${archive_uploadable}" >> "$GITHUB_OUTPUT"
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Unpack release archive for publishing
        run: |
          mkdir -p "dist/${{ steps.version.outputs.archive-uploadable }}"
          tar -xzf "dist/${{ steps.version.outputs.archive-uploadable }}.tar.gz" \
            -C "dist/${{ steps.version.outputs.archive-uploadable }}"
      - name: Upload release archive input
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.archive-artifact-name }}
          path: dist/${{ steps.version.outputs.archive-uploadable }}
          if-no-files-found: error

  publish-to-artifactory:
    needs: release
    uses: arm/remoteproc-publisher/.github/workflows/upload-to-artifactory.yaml@main
    with:
      source-run-id: ${{ github.run_id }}
      archive-name: ${{ needs.release.outputs.archive-artifact-name }}
      release-version: ${{ needs.release.outputs.release-version }}
      repo-name: remoteproc-runtime
      org-name: arm
      artifactory-uploadables: ${{ needs.release.outputs.archive-uploadable }}
      archive-format: tar.gz
      executables: ./${{ needs.release.outputs.archive-uploadable }}/remoteproc-runtime ./${{ needs.release.outputs.archive-uploadable }}/containerd-shim-remoteproc-v1
      artifactory-host: https://arm.jfrog.io
      artifactory-repo-name: devx-remoteproc-runtime
      download-base: https://artifacts.tools.arm.com/remoteproc-runtime
      subdir-path: linux
      pre-release: ${{ inputs.pre-release || false }}
    secrets: inherit

  publish-github-release:
    needs:
      - release
      - publish-to-artifactory
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release with Artifactory links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          ARTIFACT_URLS: ${{ needs.publish-to-artifactory.outputs.artifact-urls }}
          PRE_RELEASE: ${{ inputs.pre-release || false }}
        run: |
          gh api repos/{owner}/{repo}/releases/generate-notes \
            -f tag_name="$RELEASE_TAG" \
            --jq .body > existing_body.md

          {
            printf '## Downloads\n\n'
            printf '%s\n' "$ARTIFACT_URLS" | while IFS= read -r url; do
              if [ -n "$url" ]; then
                filename="${url##*/}"
                printf -- '- [%s](%s)\n' "$filename" "$url"
              fi
            done
            printf '\n\n## Changelog\n'
            cat existing_body.md
          } > combined_notes.md

          if [ "$PRE_RELEASE" = "true" ]; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --prerelease \
              --notes-file combined_notes.md
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file combined_notes.md
          fi
